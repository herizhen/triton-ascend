name: Auto Translate ZH to EN

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

concurrency:
  group: translation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # 不需要 with.token，默认用 GITHUB_TOKEN

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai==1.30.0

      - name: Run translation
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python .github/scripts/translate_md.py \
            --source-dir docs/zh \
            --target-dir docs/en

      - name: Check for changes
        id: check
        run: |
          if [ -z "$(git status --porcelain docs/en/)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/en/
          git commit -m "[Auto] Translate docs/zh to docs/en - $(date +'%Y-%m-%d')"
          git push origin HEAD:${{ github.ref_name }}
